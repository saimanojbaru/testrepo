name: scalping_agent
description: Sleek Android client for the Scalping Agent backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.6.0
  web_socket_channel: ^3.0.1
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flex_color_scheme: ^7.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
