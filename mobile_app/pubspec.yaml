name: scalping_agent
description: Monitor and control the Indian F&O scalping agent from your Android phone.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  web_socket_channel: ^3.0.1
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flex_color_scheme: ^7.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
