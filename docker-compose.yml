services:
  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: scalp_pg
    environment:
      POSTGRES_USER: scalp
      POSTGRES_PASSWORD: scalp
      POSTGRES_DB: scalp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "scalp", "-d", "scalp"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: scalp_prom
    ports:
      - "9090:9090"
    volumes:
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: scalp_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: scalp
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pg_data:
  prom_data:
  grafana_data:
