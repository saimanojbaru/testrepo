name: Python tests

on:
  push:
    branches: [main, "claude/**"]
    paths-ignore:
      - "mobile_app/**"
      - "*.md"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install scikit-learn fastapi uvicorn itsdangerous httpx

      - name: Run tests
        run: pytest -q

      - name: Run demo commands (smoke test)
        run: |
          python -m data.ingest.nse_bhavcopy --sample
          python -m data.ingest.completeness_report || true
          python -m strategies.discover --sample --max-trials 10
