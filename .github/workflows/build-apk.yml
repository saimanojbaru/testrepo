name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "mobile_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Flutter build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      # Scaffold all missing Android/iOS boilerplate (does NOT overwrite existing files
      # such as pubspec.yaml, lib/, android/app/build.gradle).
      - name: Scaffold missing Flutter platform files
        working-directory: mobile_app
        run: |
          flutter create \
            --org com.scalp \
            --project-name scalping_agent \
            --platforms android \
            .

      # flutter create generates settings.gradle without the google-services plugin.
      # Rewrite it so 'com.google.gms.google-services' resolves at build time.
      - name: Restore android/settings.gradle (add Google Services plugin)
        working-directory: mobile_app
        run: |
          cat > android/settings.gradle << 'SETTINGS'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "7.3.0" apply false
              id "org.jetbrains.kotlin.android" version "1.7.10" apply false
              id "com.google.gms.google-services" version "4.4.2" apply false
          }
          include ":app"
          SETTINGS

      # Our custom android/app/build.gradle (with FCM + correct namespace) must win
      # over the one flutter create just generated.
      - name: Restore custom android/app/build.gradle
        working-directory: mobile_app
        run: |
          cat > android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }

          android {
              namespace "com.scalp.agent"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion

              defaultConfig {
                  applicationId "com.scalp.agent"
                  minSdk 21
                  targetSdk flutter.targetSdkVersion
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source "../.."
          }

          dependencies {
              implementation platform("com.google.firebase:firebase-bom:33.1.0")
              implementation "com.google.firebase:firebase-messaging"
          }
          GRADLE

      # Stub google-services.json so the FCM plugin doesn't abort (no real push in CI)
      - name: Create stub google-services.json (no FCM in CI)
        working-directory: mobile_app
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "firebase_url": "https://placeholder.firebaseio.com",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.scalp.agent" }
              },
              "api_key": [{ "current_key": "placeholder" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON

      - name: Show Flutter/Dart versions + project layout
        working-directory: mobile_app
        run: |
          flutter --version
          echo "--- mobile_app tree (top 2 levels) ---"
          find . -maxdepth 3 -not -path '*/\.*' | sort
          echo "--- android/settings.gradle ---"
          cat android/settings.gradle
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle

      - name: Flutter pub get
        working-directory: mobile_app
        run: flutter pub get

      - name: Analyze (non-fatal — warnings allowed)
        working-directory: mobile_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scalping-agent-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          name: "APK build ${{ github.sha }}"
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
