name: Build APK

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "mobile_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: Ensure Android scaffolding exists
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --org com.scalpingagent --project-name scalping_agent .
          fi

      - name: Fetch Dart packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scalping-agent-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
