name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "mobile_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Flutter build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      # Scaffold all missing Android/iOS boilerplate (does NOT overwrite existing files
      # such as pubspec.yaml, lib/).
      - name: Scaffold missing Flutter platform files
        working-directory: mobile_app
        run: |
          flutter create \
            --org com.scalp \
            --project-name scalping_agent \
            --platforms android \
            .

      # Ensure INTERNET permission in the release manifest (flutter create only adds it
      # to debug/profile manifests). Needed for backend API + GoogleFonts.
      - name: Add INTERNET permission to release manifest
        working-directory: mobile_app
        run: |
          if ! grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' \
              android/app/src/main/AndroidManifest.xml
          fi

      - name: Show Flutter/Dart versions + project layout
        working-directory: mobile_app
        run: |
          flutter --version
          echo "--- mobile_app tree (top 3 levels) ---"
          find . -maxdepth 3 -not -path '*/\.*' | sort
          echo "--- android/settings.gradle ---"
          cat android/settings.gradle
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle
          echo "--- android/app/src/main/AndroidManifest.xml ---"
          cat android/app/src/main/AndroidManifest.xml
          echo "--- MainActivity path ---"
          find android/app/src/main/kotlin -name '*.kt' 2>/dev/null || true
          find android/app/src/main/java -name '*.kt' 2>/dev/null || true

      - name: Flutter pub get
        working-directory: mobile_app
        run: flutter pub get

      - name: Analyze (non-fatal — warnings allowed)
        working-directory: mobile_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scalping-agent-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          name: "APK build ${{ github.sha }}"
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
