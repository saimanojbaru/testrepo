name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "mobile_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Flutter build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: Create dummy google-services.json (no FCM in CI)
        run: |
          cp mobile_app/android/app/google-services.json.example \
             mobile_app/android/app/google-services.json

      - name: Flutter pub get
        working-directory: mobile_app
        run: flutter pub get

      - name: Analyze
        working-directory: mobile_app
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: mobile_app
        run: flutter test

      - name: Build release APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scalping-agent-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Create GitHub release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          name: "APK build ${{ github.sha }}"
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
