name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "mobile_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Flutter build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      # Scaffold all missing Android/iOS boilerplate (does NOT overwrite existing files
      # such as pubspec.yaml, lib/).
      - name: Scaffold missing Flutter platform files
        working-directory: mobile_app
        run: |
          flutter create \
            --org com.scalp \
            --project-name scalping_agent \
            --platforms android \
            .

      # Bump Kotlin from the Flutter 3.22.2 default (1.7.10) to 1.8.22 — required by
      # several modern plugins (flutter_secure_storage, package_info_plus 6+, open_filex).
      # AGP 7.4.2 stays compatible with Java 17 and Gradle 7.6 generated here.
      - name: Bump Kotlin + AGP versions
        working-directory: mobile_app
        run: |
          sed -i 's|"org.jetbrains.kotlin.android" version "1.7.10"|"org.jetbrains.kotlin.android" version "1.8.22"|' \
            android/settings.gradle
          sed -i 's|"com.android.application" version "7.3.0"|"com.android.application" version "7.4.2"|' \
            android/settings.gradle

      # Ensure INTERNET permission in the release manifest (flutter create only adds it
      # to debug/profile manifests). Needed for backend API + GoogleFonts.
      - name: Add INTERNET permission to release manifest
        working-directory: mobile_app
        run: |
          if ! grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' \
              android/app/src/main/AndroidManifest.xml
          fi

      # In-app updater needs REQUEST_INSTALL_PACKAGES to fire the system installer.
      - name: Add REQUEST_INSTALL_PACKAGES permission
        working-directory: mobile_app
        run: |
          if ! grep -q "REQUEST_INSTALL_PACKAGES" android/app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>\n    <application|' \
              android/app/src/main/AndroidManifest.xml
          fi

      # Android 11+ package visibility: url_launcher needs <intent>s for browser launch
      # and the in-app installer needs the package-archive intent. The default Flutter
      # manifest ALREADY contains a <queries> block (PROCESS_TEXT) — we MERGE into it
      # rather than skipping (the previous skip-if-exists check was a bug).
      - name: Merge browser + apk-install intents into <queries>
        working-directory: mobile_app
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android:scheme="https"' "$MANIFEST"; then
            python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          src = p.read_text()
          extra = """    <intent>
                  <action android:name="android.intent.action.VIEW" />
                  <data android:scheme="https" />
              </intent>
              <intent>
                  <action android:name="android.intent.action.VIEW" />
                  <data android:mimeType="application/vnd.android.package-archive" />
              </intent>
          """
          if "<queries>" in src and 'scheme="https"' not in src:
              src = src.replace("<queries>", "<queries>\n        " + extra.strip() + "\n        ", 1)
          p.write_text(src)
          PY
          fi

      - name: Show Flutter/Dart versions + final manifest + gradle
        working-directory: mobile_app
        run: |
          flutter --version
          echo "--- android/settings.gradle ---"
          cat android/settings.gradle
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle
          echo "--- android/app/src/main/AndroidManifest.xml ---"
          cat android/app/src/main/AndroidManifest.xml

      - name: Flutter pub get
        working-directory: mobile_app
        run: flutter pub get

      - name: Analyze (non-fatal)
        working-directory: mobile_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        working-directory: mobile_app
        run: |
          flutter build apk --release --no-tree-shake-icons --verbose \
            --dart-define=BUILD_SHA=${{ github.sha }}

      # Always show what's in the build dir, even when the build fails — makes it
      # obvious whether we got an APK or whether we hit an earlier compile error.
      - name: Show build output tree (always)
        if: always()
        working-directory: mobile_app
        run: |
          echo "--- build/app/outputs (if it exists) ---"
          find build/app/outputs -type f 2>/dev/null || echo "(no outputs directory — build never produced files)"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scalping-agent-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub release on main
        if: github.ref == 'refs/heads/main' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          name: "APK build ${{ github.sha }}"
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
