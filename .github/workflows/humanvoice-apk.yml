name: HumanVoice Books — Android APK

on:
  push:
    branches:
      - claude/humanvoice-books-flutter-app-LHaHy
      - main
    paths:
      - 'humanvoice_books/**'
      - '.github/workflows/humanvoice-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: flutter build apk --release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: humanvoice_books

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.24.5 stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install Android SDK packages
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            tools
            platform-tools
            platforms;android-34
            platforms;android-35
            build-tools;34.0.0
            build-tools;35.0.0
            ndk;26.3.11579264

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('humanvoice_books/android/**/*.gradle*', 'humanvoice_books/pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Pin Gradle wrapper to a version compatible with AGP 8.1
        run: |
          # AGP 8.1 needs Gradle 8.0–8.5; we pin 8.4 explicitly so the wrapper
          # generated by `flutter create` (which we don't run any more) can't
          # drift to whatever ships in the Flutter version's template.
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-all.zip
          EOF

      - name: Generate platform binaries we don't track (gradlew, icons)
        run: |
          # We previously ran `flutter create . --overwrite` here, which silently
          # rewrote lib/main.dart and android/app/build.gradle back to template
          # defaults — that's why an earlier APK shipped the counter demo. Now
          # we scaffold into a sibling dir and copy ONLY the binary-or-template
          # files Flutter must own (gradlew jar+scripts and the launcher PNGs).
          set -eux
          SCRATCH="$(mktemp -d)"
          flutter create "$SCRATCH/scaffold" \
            --platforms=android \
            --org com.humanvoice \
            --project-name humanvoice_books

          mkdir -p android/gradle/wrapper
          cp -f "$SCRATCH/scaffold/android/gradle/wrapper/gradle-wrapper.jar" \
                android/gradle/wrapper/
          cp -f "$SCRATCH/scaffold/android/gradlew"     android/
          cp -f "$SCRATCH/scaffold/android/gradlew.bat" android/
          chmod +x android/gradlew

          for d in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            if [ -d "$SCRATCH/scaffold/android/app/src/main/res/$d" ]; then
              mkdir -p "android/app/src/main/res/$d"
              cp -fr "$SCRATCH/scaffold/android/app/src/main/res/$d/." \
                     "android/app/src/main/res/$d/"
            fi
          done

      - name: Sanity-check our code wasn't replaced
        run: |
          set -eux
          # main.dart should still wire HumanVoiceApp -> SplashScreen.
          grep -q 'HumanVoiceApp'         lib/main.dart
          grep -q 'SplashScreen'          lib/main.dart
          grep -q 'ui/splash_screen.dart' lib/main.dart

          # The premium reader UI screens must all be present.
          test -f lib/ui/splash_screen.dart
          test -f lib/ui/library_screen.dart
          test -f lib/ui/reader_screen.dart

          # Locked-backend tripwire: services we are not allowed to modify.
          test -f lib/services/tts_service.dart
          test -f lib/services/model_service.dart

          # Belt-and-suspenders: any drift back to the Flutter counter-app demo
          # (e.g. accidental `flutter create --overwrite`) will fail loudly.
          if grep -qi 'flutter demo home page' lib/main.dart; then
            echo "::error::lib/main.dart is the counter-app demo"
            exit 1
          fi

          grep -q 'compileSdk 35' android/app/build.gradle
          grep -q 'sherpa_onnx'   pubspec.yaml

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        id: build
        run: flutter build apk --release

      - name: Rename APK
        if: success() && steps.build.outcome == 'success'
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/HumanVoiceBooks-${{ github.sha }}.apk

      - name: Upload APK artifact
        if: success() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: HumanVoiceBooks-apk
          path: humanvoice_books/build/app/outputs/flutter-apk/HumanVoiceBooks-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Gradle build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            humanvoice_books/build/**/outputs/logs/**
            humanvoice_books/build/**/reports/**
            humanvoice_books/.gradle/**/*.log
            ~/.gradle/daemon/**/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Re-run Gradle with --stacktrace on failure (last-ditch diagnostic)
        if: failure()
        run: |
          cd android && ./gradlew :app:assembleRelease --stacktrace --no-daemon 2>&1 | tail -200 || true

      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: humanvoice_books/build/app/outputs/flutter-apk/HumanVoiceBooks-*.apk
          generate_release_notes: true
