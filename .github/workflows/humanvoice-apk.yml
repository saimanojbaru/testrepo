name: HumanVoice Books — Android APK

on:
  push:
    branches:
      - claude/humanvoice-books-flutter-app-LHaHy
      - main
    paths:
      - 'humanvoice_books/**'
      - '.github/workflows/humanvoice-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: flutter build apk --release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: humanvoice_books

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android cmdline-tools + NDK 27
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0
            ndk;27.0.12077973
            cmake;3.22.1

      - name: Set up Flutter 3.24.5 stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Generate platform scaffolding
        run: |
          # Recreate any platform files we don't track (icons, gradle wrappers, iOS stubs).
          flutter create . \
            --platforms=android \
            --org com.humanvoice \
            --project-name humanvoice_books \
            --overwrite

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        run: |
          flutter build apk --release \
            --target-platform android-arm64,android-arm,android-x64

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/HumanVoiceBooks-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HumanVoiceBooks-apk
          path: humanvoice_books/build/app/outputs/flutter-apk/HumanVoiceBooks-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: humanvoice_books/build/app/outputs/flutter-apk/HumanVoiceBooks-*.apk
          generate_release_notes: true
