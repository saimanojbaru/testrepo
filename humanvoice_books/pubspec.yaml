name: humanvoice_books
description: Offline-first EPUB-to-Audiobook with contextual multi-voice synthesis (Kokoro-82M).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # On-device TTS (Kokoro-82M / Matcha / Vits) via ONNX Runtime FFI.
  # sherpa_onnx_android_* prebuilts mean no NDK compile step.
  sherpa_onnx: ^1.13.0

  # Audio muxing (m4b chapter container) — audio-only build keeps APK lean.
  ffmpeg_kit_flutter_audio: ^6.0.3

  # File / storage
  path_provider: ^2.1.3
  file_picker: ^8.0.5
  permission_handler: ^11.3.1

  # EPUB parsing
  epubx: ^4.0.0

  # State (lightweight: ValueNotifier + StatefulWidget for UI; the Bloc
  # layer was removed in the UX rewrite — services own their own state).
  equatable: ^2.0.5

  # HTTP for HuggingFace downloads + integrity hashing
  http: ^1.2.2
  crypto: ^3.0.5

  # Pure-Dart tar.bz2 extraction. Toybox tar on Android is inconsistent
  # across vendors (some lack --strip-components, some choke on bz2);
  # going pure-Dart eliminates that whole class of silent failure.
  archive: ^3.6.1

  # Reader UX
  google_fonts: ^6.2.1
  flutter_html: ^3.0.0-beta.2
  shared_preferences: ^2.3.2
  animations: ^2.0.11

  # In-app audio playback for the "Read to Me" bridge.
  just_audio: ^0.9.40

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
