name: humanvoice_books
description: Offline-first EPUB-to-Audiobook with contextual multi-voice synthesis (Kokoro-82M + Qwen2.5-1.5B).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # On-device TTS (Kokoro-82M / Matcha / Vits) via ONNX Runtime FFI.
  # Note: sherpa_onnx is TTS/ASR/VAD only — it does NOT generate text from a GGUF.
  sherpa_onnx: ^1.13.0

  # On-device LLM (Qwen 2.5 GGUF via llama.cpp under the hood).
  # Used by the Director to tag each paragraph with voice_id + emotion.
  fllama: ^0.0.1

  # Audio muxing (m4b chapter container) - audio-only build to keep APK lean
  ffmpeg_kit_flutter_audio: ^6.0.3

  # File / storage / picker
  path_provider: ^2.1.3
  file_picker: ^8.0.5
  permission_handler: ^11.3.1

  # EPUB parsing
  epubx: ^4.0.0

  # Recording (optional voice-cloning hook for future phase)
  record: ^5.1.2

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP for HuggingFace downloads
  http: ^1.2.2
  crypto: ^3.0.5

  # Audio playback (chapter preview & main player)
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
